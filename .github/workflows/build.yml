name: Build APK & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # المشروع مرفوع بدون مجلد android/ (يُولّد هنا فقط).
      # نحفظ نسخة احتياطية من ملفاتنا الأصلية لضمان عدم استبدالها
      # بأي حال، بغض النظر عن سلوك "flutter create" الافتراضي.
      - name: Backup project files
        run: |
          mkdir -p /tmp/backup
          cp -r lib /tmp/backup/lib
          cp pubspec.yaml /tmp/backup/pubspec.yaml

      - name: Generate Android project files
        run: flutter create . --platforms=android --org com.mo7ammed64 --project-name comicverse_app

      - name: Restore project files
        run: |
          rm -rf lib
          cp -r /tmp/backup/lib lib
          cp /tmp/backup/pubspec.yaml pubspec.yaml

      - name: Add internet permission to AndroidManifest
        run: |
          sed -i 's#<manifest xmlns:android="http://schemas.android.com/apk/res/android">#<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET" />#' android/app/src/main/AndroidManifest.xml

      # فك ترميز Keystore من Base64 وحفظه كملف مؤقت في بيئة الـ CI
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      # إنشاء ملف key.properties الذي يقرأه Gradle أثناء البناء للتوقيع
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      # نستبدل build.gradle المُولَّد تلقائياً بملفنا الجاهز الذي يحوي
      # إعدادات التوقيع — أبسط بكثير من تعديله ديناميكياً بسكربت.
      - name: Use custom build.gradle (with signing config)
        run: cp ci/app-build.gradle android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release signed)
        run: flutter build apk --release

      - name: Set release tag
        id: tag
        run: echo "tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk comicverse-${{ steps.tag.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Comicverse ${{ steps.tag.outputs.tag }}
          body: |
            بناء تلقائي موقَّع من GitHub Actions
            الكوميت: ${{ github.sha }}
          files: comicverse-${{ steps.tag.outputs.tag }}.apk

